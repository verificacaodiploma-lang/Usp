<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>USP - Sistema Oficial de Verificação Acadêmica</title>

  <style>
    :root {
      --gov-azul: #1351b4;
      --gov-amarelo: #f2c94c;
      --gov-cinza-escuro: #4a4a4a;
      --gov-cinza-claro: #f2f2f2;
      --gov-card: #ffffff;
      --gov-borda: #dcdcdc;
    }

    body {
      margin: 0;
      background: var(--gov-cinza-claro);
      font-family: Arial, sans-serif;
      color: var(--gov-cinza-escuro);
    }

    header {
      background: var(--gov-azul);
      color: white;
      padding: 18px 24px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    header span {
      background: var(--gov-amarelo);
      color: #000;
      padding: 3px 6px;
      border-radius: 4px;
      margin-right: 4px;
    }

    .container {
      max-width: 760px;
      margin: 40px auto;
      background: var(--gov-card);
      padding: 30px;
      border-radius: 6px;
      border: 1px solid var(--gov-borda);
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--gov-azul);
    }

    label {
      font-weight: 600;
      display: block;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid var(--gov-borda);
      margin-top: 6px;
      font-size: 15px;
      background: #fff;
    }

    button {
      margin-top: 22px;
      width: 100%;
      padding: 14px;
      background: var(--gov-azul);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #0f4498;
    }

    .resultado {
      margin-top: 25px;
      padding: 18px;
      border-radius: 4px;
      border: 1px solid var(--gov-borda);
      display: none;
    }

    .sucesso {
      background: #e6f4ea;
      border-left: 4px solid #2e7d32;
    }

    .erro {
      background: #fdecea;
      border-left: 4px solid #c62828;
    }

    footer {
      margin-top: 50px;
      padding: 25px;
      background: var(--gov-azul);
      color: white;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <span>demo</span> Sistema Demonstrativo de Verificação Acadêmica
  </header>

  <div class="container">
    <h2>Consulta de Registro Acadêmico</h2>

    <label>Código de Verificação</label>
    <input id="codigo" type="text" placeholder="Digite o código do registro">

    <button onclick="verificar()">Consultar</button>

    <div id="resultado" class="resultado"></div>
  </div>

  <footer>
    USP
  </footer>

  <script>
    function verificar() {
      const codigo = document.getElementById("codigo").value.trim();
      const box = document.getElementById("resultado");

      if (codigo === "") {
        box.style.display = "block";
        box.className = "resultado erro";
        box.innerHTML = "<strong>Erro:</strong> Informe um código válido.";
        return;
      }

      /* REGISTRO 1 */
      if (codigo === "58755-86") {
        box.style.display = "block";
        box.className = "resultado sucesso";
        box.innerHTML =
          "<strong>Registro encontrado!</strong><br><br>" +
          "Nome: Jacqueline Ferreira da Silva<br>" +
          "Formação: Mestrado em Psicologia<br>" +
          "Instituição: Universidade de São Paulo - USP" +
          "Conclusão: 13/08/2021<br>" +
          "Registro: 58755-86";
      }

      /* REGISTRO 2 */
      else if (codigo === "233465-12") {
        box.style.display = "block";
        box.className = "resultado sucesso";
        box.innerHTML =
          "<strong>Registro encontrado!</strong><br><br>" +
          "Nome: Juliana Benevides Aires de Castro<br>" +
          "Formação: Pós-Graduação em Psicologia Perinatal e Parental<br>" +
          "Instituição: Universidade de São Paulo - USP" +
          "Conclusão: 24/06/2021<br>" +
          "Registro: 233465-12";
      }

      else {
        box.style.display = "block";
        box.className = "resultado erro";
        box.innerHTML =
          "<strong>Não encontrado:</strong> Nenhum registro corresponde ao código informado.";
      }
    }
  </script>

</body>
</html>
